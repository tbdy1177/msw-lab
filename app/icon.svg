<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Body -->
  <rect x="18" y="38" width="64" height="52" rx="12" fill="#F4A827"/>
  <!-- Head top bump (antenna base) -->
  <rect x="44" y="22" width="12" height="18" rx="4" fill="#F4A827"/>
  <!-- Antenna ball -->
  <circle cx="50" cy="18" r="6" fill="#FF6B2B"/>
  <!-- Face plate -->
  <rect x="24" y="44" width="52" height="38" rx="8" fill="#FFD166"/>
  <!-- Left eye -->
  <rect x="30" y="52" width="14" height="12" rx="4" fill="#1A1A1A"/>
  <circle cx="35" cy="55" r="3" fill="white"/>
  <!-- Right eye -->
  <rect x="56" y="52" width="14" height="12" rx="4" fill="#1A1A1A"/>
  <circle cx="61" cy="55" r="3" fill="white"/>
  <!-- Angry mouth -->
  <rect x="34" y="70" width="32" height="6" rx="3" fill="#E09520"/>
  <!-- Mouth notch (grumpy expression) -->
  <rect x="46" y="70" width="8" height="4" rx="2" fill="#FFD166"/>
  <!-- Left ear bolt -->
  <circle cx="18" cy="58" r="5" fill="#E09520"/>
  <!-- Right ear bolt -->
  <circle cx="82" cy="58" r="5" fill="#E09520"/>
</svg>
